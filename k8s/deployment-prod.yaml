apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-app
  namespace: prod-study
spec:
  replicas: 2
  selector:
    matchLabels:
      app: study-app
  template:
    metadata:
      labels:
        app: study-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: study-app
        image: ghcr.io/orbite82/pipeline/study-app:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"