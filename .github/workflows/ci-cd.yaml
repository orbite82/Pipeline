name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install

      - name: Testar aplicação
        run: npm test || echo "Nenhum teste configurado"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build e Push da imagem
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/orbite82/pipeline/study-app:latest
            ghcr.io/orbite82/pipeline/study-app:${{ github.sha }}

  deploy-dev:
    runs-on: self-hosted
    needs: build
    environment: dev-study
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configurar acesso ao cluster DEV
        run: |
          printf "%s" "${{ secrets.KUBECONFIG_DEV }}" > $HOME/.kube/config

      - name: Garantir namespace DEV
        run: kubectl create namespace dev-study --dry-run=client -o yaml | kubectl apply -f -

      - name: Atualizar imagem no deployment DEV
        run: |
          kubectl set image deployment/study-app study-app=ghcr.io/orbite82/pipeline/study-app:${{ github.sha }} -n dev-study
          kubectl rollout status deployment study-app -n dev-study

  deploy-prod:
    runs-on: self-hosted
    needs: build
    environment: prod-study
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configurar acesso ao cluster PROD
        run: |
          printf "%s" "${{ secrets.KUBECONFIG_PROD }}" > $HOME/.kube/config

      - name: Garantir namespace PROD
        run: kubectl create namespace prod-study --dry-run=client -o yaml | kubectl apply -f -

      - name: Atualizar imagem no deployment PROD
        run: |
          kubectl set image deployment/study-app study-app=ghcr.io/orbite82/pipeline/study-app:${{ github.sha }} -n prod-study
          kubectl rollout status deployment study-app -n prod-study          